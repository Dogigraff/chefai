name: ChefOS
options:
  bundleIdPrefix: com.dogigraff
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ChefOS:
    type: application
    platform: iOS
    sources:
      - path: ChefOS
        excludes:
          - Support
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dogigraff.ChefOS
        PRODUCT_NAME: ChefOS
        INFOPLIST_FILE: ChefOS/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: ChefOS/Support/ChefOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        LOCALIZATION_PREFERS_STRING_CATALOGS: NO

  ChefOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ChefOSTests
    dependencies:
      - target: ChefOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dogigraff.ChefOSTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ChefOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ChefOS
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  ChefOS:
    build:
      targets:
        ChefOS: all
        ChefOSTests: [test]
    test:
      targets:
        - ChefOSTests
      environmentVariables:
        OPENAI_API_KEY: ""
