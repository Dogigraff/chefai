<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChefOS Registration</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00c753",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f2317",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Neo-Gourmet Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .glass:focus-within {
            border-color: #00c753;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 4px rgba(0, 199, 83, 0.1);
        }

        /* Abstract Background Animation */
        @keyframes float {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        
        .blob-anim {
            animation: float 20s infinite ease-in-out;
        }

        .blob-anim-delayed {
            animation: float 25s infinite ease-in-out reverse;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display text-slate-900 dark:text-white overflow-x-hidden selection:bg-primary selection:text-white">
<!-- Background Ambience -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0 bg-[#121212]/50">
<!-- Mint Glow Top Left -->
<div class="absolute -top-[10%] -left-[10%] w-[70vw] h-[70vw] bg-primary/20 rounded-full blur-[100px] mix-blend-screen blob-anim opacity-40"></div>
<!-- Secondary Glow Bottom Right -->
<div class="absolute top-[40%] -right-[20%] w-[80vw] h-[80vw] bg-emerald-900/40 rounded-full blur-[120px] mix-blend-screen blob-anim-delayed opacity-50"></div>
</div>
<!-- Main Container -->
<div class="relative z-10 flex flex-col min-h-screen w-full max-w-[480px] mx-auto px-6 py-4">
<!-- Top Navigation -->
<nav class="flex items-center justify-between py-2 mb-4">
<button class="flex items-center justify-center size-10 rounded-full glass text-white hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined text-[20px]">chevron_left</span>
</button>
<!-- Hidden placeholder for centering if needed, or keeping it clean -->
<div class="w-10"></div>
</nav>
<!-- Header Content -->
<header class="flex flex-col items-center text-center mt-2 mb-8">
<div class="mb-6 relative group">
<div class="absolute inset-0 bg-primary/40 rounded-2xl blur-lg group-hover:bg-primary/60 transition-all duration-500"></div>
<div class="relative flex items-center justify-center size-16 rounded-2xl bg-[#1b2820] border border-white/10 shadow-xl">
<span class="material-symbols-outlined text-[32px] text-primary">skillet</span>
</div>
</div>
<h1 class="text-3xl md:text-[34px] font-bold tracking-tight text-white mb-3">
                Join the Kitchen
            </h1>
<p class="text-white/60 text-base leading-relaxed max-w-[280px]">
                Create your ChefOS ID and unlock thousands of premium recipes.
            </p>
</header>
<!-- Registration Form -->
<main class="flex-1 w-full">
<form action="#" class="flex flex-col gap-5" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-white/90 ml-1">Email Address</label>
<div class="glass flex items-center rounded-xl h-14 px-4 transition-all duration-300">
<span class="material-symbols-outlined text-white/40 mr-3">mail</span>
<input class="flex-1 bg-transparent border-none text-white placeholder:text-white/30 focus:ring-0 p-0 text-base font-medium" placeholder="chef@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-white/90 ml-1">Password</label>
<div class="glass flex items-center rounded-xl h-14 px-4 transition-all duration-300 relative">
<span class="material-symbols-outlined text-white/40 mr-3">lock</span>
<input class="flex-1 bg-transparent border-none text-white placeholder:text-white/30 focus:ring-0 p-0 text-base font-medium" placeholder="Create a password" required="" type="password"/>
<button class="absolute right-4 text-white/40 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-2">
<button class="w-full h-14 bg-primary hover:bg-[#00e05e] active:scale-[0.98] transition-all duration-200 rounded-xl shadow-[0_8px_25px_-8px_rgba(0,199,83,0.5)] flex items-center justify-center gap-2 group" type="submit">
<span class="text-white font-bold text-lg tracking-wide">Start Cooking</span>
<span class="material-symbols-outlined text-white group-hover:translate-x-1 transition-transform text-[20px]">arrow_forward</span>
</button>
</div>
<!-- Divider -->
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/10"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-[#0f2317] px-4 text-xs font-semibold text-white/40 uppercase tracking-wider rounded-full">Or join with</span>
</div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="glass h-14 rounded-xl flex items-center justify-center gap-3 transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]" type="button">
<svg class="h-5 w-5 fill-white" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74 1.18 0 2.21-1.23 3.91-1.12 1.5.09 2.3.63 3.1 1.4-2.8 1.6-2.09 5.23.47 6.47-.67 1.95-1.8 3.79-2.56 5.48zM12.03 5.38c-.43-2.18 1.85-4.38 4-4.38.29 2.38-2.61 4.54-4 4.38z"></path>
</svg>
<span class="text-white font-semibold">Apple</span>
</button>
<button class="glass h-14 rounded-xl flex items-center justify-center gap-3 transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]" type="button">
<svg class="h-5 w-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-white font-semibold">Google</span>
</button>
</div>
</form>
</main>
<!-- Footer -->
<footer class="mt-auto pt-6 text-center">
<p class="text-white/50 text-sm font-medium">
                Already have an account? 
                <a class="text-primary hover:text-[#00e05e] transition-colors ml-1 font-bold" href="#">Log In</a>
</p>
</footer>
</div>
</body></html>
