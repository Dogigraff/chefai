<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Recipe - ChefOS</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00c753",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f2317",
                        "surface-dark": "#1b2820",
                        "border-dark": "#395645",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased selection:bg-primary selection:text-white">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-2xl shadow-black">
<!-- Header -->
<header class="sticky top-0 z-50 flex items-center justify-between bg-background-light/90 dark:bg-background-dark/90 px-4 py-3 backdrop-blur-md transition-colors">
<button class="flex size-10 items-center justify-center rounded-full text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-surface-dark transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight">New Recipe</h2>
<button class="flex h-10 items-center justify-center rounded-full px-4 text-base font-bold text-primary hover:bg-primary/10 transition-colors">
                Save
            </button>
</header>
<main class="flex-1 flex flex-col gap-6 p-4 pb-24">
<!-- Image Upload Section -->
<div class="group relative aspect-video w-full overflow-hidden rounded-xl bg-surface-dark border-2 border-dashed border-border-dark hover:border-primary transition-colors cursor-pointer flex flex-col items-center justify-center gap-2">
<div class="absolute inset-0 bg-cover bg-center opacity-40 transition-opacity group-hover:opacity-30" data-alt="Dark abstract kitchen countertop texture" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB1rQxaovkhC0WtYk2wRTjPz6XEelDQAl0J38zt0aWGb5VaVMo-mt3jRWvdr-Z6pucNMJGRZ1Oq0Rg7CgahmcCm_Je9YuT6FS0q2BXdgGjtj90oVwpQwAWwHuT_hxCDdsv7XQByLiRnMzJ5ReQZAvsupPasNBuOvAT6XThW6WRvtheOGB0Y3r4GvEdbXND0ZZwOGmTEb_6NGVgXPX6XTYg7eX7zssKG8EsVyHGD7ToAYkkUnPp15a88EQBnEes9ne85YBnzdTvOM8U');">
</div>
<div class="z-10 flex size-14 items-center justify-center rounded-full bg-background-dark/80 text-primary backdrop-blur-sm shadow-lg">
<span class="material-symbols-outlined text-3xl">add_a_photo</span>
</div>
<div class="z-10 text-sm font-medium text-white/90">Add Cover Photo</div>
</div>
<!-- Basic Info -->
<div class="flex flex-col gap-5">
<!-- Title -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-400 uppercase tracking-wider" for="recipe-title">Title</label>
<input class="w-full rounded-xl border border-border-dark bg-surface-dark/50 p-4 text-lg font-medium text-white placeholder:text-slate-500 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary transition-all shadow-sm" id="recipe-title" placeholder="e.g., Spicy Basil Chicken" type="text"/>
</div>
<!-- Description -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-400 uppercase tracking-wider" for="recipe-desc">Description</label>
<textarea class="w-full resize-none rounded-xl border border-border-dark bg-surface-dark/50 p-4 text-base text-white placeholder:text-slate-500 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary transition-all shadow-sm" id="recipe-desc" placeholder="Tell us about this dish, what makes it special?" rows="3"></textarea>
</div>
</div>
<!-- Timing Section -->
<div class="flex flex-col gap-3">
<h3 class="text-xl font-bold text-white">Timing</h3>
<div class="grid grid-cols-2 gap-4">
<!-- Prep Time -->
<div class="relative flex items-center rounded-xl border border-border-dark bg-surface-dark/50 p-3 shadow-sm focus-within:border-primary focus-within:ring-1 focus-within:ring-primary">
<span class="material-symbols-outlined text-slate-400 mr-2 text-xl">schedule</span>
<div class="flex flex-col">
<label class="text-xs font-medium text-slate-500">Prep Time</label>
<div class="flex items-baseline gap-1">
<input class="h-6 w-full border-0 bg-transparent p-0 text-base font-medium text-white placeholder:text-slate-600 focus:ring-0" placeholder="0" type="number"/>
<span class="text-xs text-slate-400">min</span>
</div>
</div>
</div>
<!-- Cook Time -->
<div class="relative flex items-center rounded-xl border border-border-dark bg-surface-dark/50 p-3 shadow-sm focus-within:border-primary focus-within:ring-1 focus-within:ring-primary">
<span class="material-symbols-outlined text-slate-400 mr-2 text-xl">oven_gen</span>
<div class="flex flex-col">
<label class="text-xs font-medium text-slate-500">Cook Time</label>
<div class="flex items-baseline gap-1">
<input class="h-6 w-full border-0 bg-transparent p-0 text-base font-medium text-white placeholder:text-slate-600 focus:ring-0" placeholder="0" type="number"/>
<span class="text-xs text-slate-400">min</span>
</div>
</div>
</div>
</div>
</div>
<!-- Ingredients Section -->
<div class="flex flex-col gap-4">
<div class="flex items-center justify-between">
<h3 class="text-xl font-bold text-white">Ingredients</h3>
<span class="text-xs font-medium text-slate-500">3 items</span>
</div>
<div class="flex flex-col gap-3">
<!-- Ingredient Row 1 -->
<div class="group flex items-center gap-2 animate-in fade-in slide-in-from-bottom-2 duration-300">
<div class="handle cursor-grab text-slate-600 hover:text-white transition-colors">
<span class="material-symbols-outlined text-xl">drag_indicator</span>
</div>
<input class="w-20 rounded-lg border border-border-dark bg-surface-dark/50 px-3 py-3 text-center text-sm font-medium text-white placeholder:text-slate-500 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary" placeholder="Qty" type="text"/>
<input class="flex-1 rounded-lg border border-border-dark bg-surface-dark/50 px-3 py-3 text-sm font-medium text-white placeholder:text-slate-500 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary" placeholder="Item name" type="text"/>
<button class="flex size-10 items-center justify-center rounded-lg text-slate-500 hover:bg-red-500/10 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Ingredient Row 2 -->
<div class="group flex items-center gap-2">
<div class="handle cursor-grab text-slate-600 hover:text-white transition-colors">
<span class="material-symbols-outlined text-xl">drag_indicator</span>
</div>
<input class="w-20 rounded-lg border border-border-dark bg-surface-dark/50 px-3 py-3 text-center text-sm font-medium text-white placeholder:text-slate-500 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary" type="text" value="2 tbsp"/>
<input class="flex-1 rounded-lg border border-border-dark bg-surface-dark/50 px-3 py-3 text-sm font-medium text-white placeholder:text-slate-500 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary" type="text" value="Olive Oil"/>
<button class="flex size-10 items-center justify-center rounded-lg text-slate-500 hover:bg-red-500/10 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Add Ingredient Button -->
<button class="mt-2 flex w-full items-center justify-center gap-2 rounded-xl border border-dashed border-border-dark bg-surface-dark/20 py-3 text-sm font-bold text-primary hover:bg-surface-dark/40 hover:border-primary transition-all">
<span class="material-symbols-outlined text-lg">add_circle</span>
                        Add Ingredient
                    </button>
</div>
</div>
<!-- Separator -->
<div class="h-px w-full bg-border-dark/50"></div>
<!-- Instructions Section -->
<div class="flex flex-col gap-4">
<h3 class="text-xl font-bold text-white">Instructions</h3>
<div class="flex flex-col gap-4">
<!-- Step 1 -->
<div class="relative flex gap-4">
<div class="flex flex-col items-center gap-2">
<div class="flex size-8 shrink-0 items-center justify-center rounded-full bg-primary text-sm font-bold text-background-dark">1</div>
<div class="h-full w-0.5 bg-border-dark"></div>
</div>
<div class="flex-1 pb-4">
<textarea class="w-full resize-none rounded-xl border border-border-dark bg-surface-dark/50 p-3 text-sm leading-relaxed text-white placeholder:text-slate-500 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary shadow-sm" placeholder="Describe this step..." rows="3"></textarea>
<div class="mt-2 flex justify-end">
<button class="text-xs font-medium text-slate-500 hover:text-red-400 transition-colors">Remove Step</button>
</div>
</div>
</div>
<!-- Step 2 -->
<div class="relative flex gap-4">
<div class="flex flex-col items-center gap-2">
<div class="flex size-8 shrink-0 items-center justify-center rounded-full border border-border-dark bg-surface-dark text-sm font-bold text-slate-400">2</div>
</div>
<div class="flex-1">
<textarea class="w-full resize-none rounded-xl border border-border-dark bg-surface-dark/50 p-3 text-sm leading-relaxed text-white placeholder:text-slate-500 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary shadow-sm" placeholder="Describe the next step..." rows="3"></textarea>
</div>
</div>
<!-- Add Step Button -->
<button class="mt-4 flex w-full items-center justify-center gap-2 rounded-xl border border-dashed border-border-dark bg-surface-dark/20 py-3 text-sm font-bold text-primary hover:bg-surface-dark/40 hover:border-primary transition-all">
<span class="material-symbols-outlined text-lg">add_circle</span>
                        Add Step
                    </button>
</div>
</div>
</main>
</div>
</body></html>
