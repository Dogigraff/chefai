<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChefOS Preferences</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00c753",
                        "background-light": "#f5f8f7",
                        "background-dark": "#121212", /* Overridden to match user request */
                        "surface-dark": "#1E1E1E",
                        "surface-active": "#2C2C2C",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-white overflow-x-hidden selection:bg-primary selection:text-white">
<div class="relative flex h-full min-h-screen w-full flex-col pb-24">
<!-- Header -->
<div class="sticky top-0 z-50 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 pb-2 justify-between border-b border-gray-200 dark:border-white/5">
<button class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Personalize ChefOS</h2>
<button class="flex w-16 items-center justify-center h-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<p class="text-primary text-base font-bold leading-normal tracking-[0.015em] shrink-0">Skip</p>
</button>
</div>
<!-- Section 1: Dietary Needs -->
<div class="flex flex-col px-4 mt-2">
<h2 class="text-slate-900 dark:text-white tracking-tight text-[28px] font-bold leading-tight text-left pt-5">Dietary Needs</h2>
<p class="text-slate-500 dark:text-gray-400 text-base font-normal leading-normal pb-6 pt-2">
                Do you follow any specific diet? Select all that apply.
            </p>
<div class="flex flex-col gap-3">
<!-- Checklist Item: Vegetarian -->
<label class="group relative flex items-center justify-between p-4 rounded-xl bg-white dark:bg-surface-dark border border-transparent dark:border-white/5 hover:border-primary/50 transition-all cursor-pointer shadow-sm">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">eco</span>
</div>
<span class="text-base font-semibold text-slate-900 dark:text-white">Vegetarian</span>
</div>
<div class="relative">
<input class="peer sr-only" type="checkbox"/>
<div class="h-6 w-11 rounded-full bg-slate-200 dark:bg-zinc-700 after:absolute after:top-[2px] after:left-[2px] after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-all after:content-[''] peer-checked:bg-primary peer-checked:after:translate-x-full peer-focus:outline-none"></div>
</div>
</label>
<!-- Checklist Item: Vegan -->
<label class="group relative flex items-center justify-between p-4 rounded-xl bg-white dark:bg-surface-dark border border-transparent dark:border-white/5 hover:border-primary/50 transition-all cursor-pointer shadow-sm">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">spa</span>
</div>
<span class="text-base font-semibold text-slate-900 dark:text-white">Vegan</span>
</div>
<div class="relative">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="h-6 w-11 rounded-full bg-slate-200 dark:bg-zinc-700 after:absolute after:top-[2px] after:left-[2px] after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-all after:content-[''] peer-checked:bg-primary peer-checked:after:translate-x-full peer-focus:outline-none"></div>
</div>
</label>
<!-- Checklist Item: Gluten-Free -->
<label class="group relative flex items-center justify-between p-4 rounded-xl bg-white dark:bg-surface-dark border border-transparent dark:border-white/5 hover:border-primary/50 transition-all cursor-pointer shadow-sm">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">grain</span>
</div>
<span class="text-base font-semibold text-slate-900 dark:text-white">Gluten-Free</span>
</div>
<div class="relative">
<input class="peer sr-only" type="checkbox"/>
<div class="h-6 w-11 rounded-full bg-slate-200 dark:bg-zinc-700 after:absolute after:top-[2px] after:left-[2px] after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-all after:content-[''] peer-checked:bg-primary peer-checked:after:translate-x-full peer-focus:outline-none"></div>
</div>
</label>
<!-- Checklist Item: Keto -->
<label class="group relative flex items-center justify-between p-4 rounded-xl bg-white dark:bg-surface-dark border border-transparent dark:border-white/5 hover:border-primary/50 transition-all cursor-pointer shadow-sm">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">egg</span>
</div>
<span class="text-base font-semibold text-slate-900 dark:text-white">Keto</span>
</div>
<div class="relative">
<input class="peer sr-only" type="checkbox"/>
<div class="h-6 w-11 rounded-full bg-slate-200 dark:bg-zinc-700 after:absolute after:top-[2px] after:left-[2px] after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-all after:content-[''] peer-checked:bg-primary peer-checked:after:translate-x-full peer-focus:outline-none"></div>
</div>
</label>
</div>
</div>
<div class="h-px w-full bg-gray-100 dark:bg-white/5 my-8"></div>
<!-- Section 2: Favorite Cuisines -->
<div class="flex flex-col px-4">
<h2 class="text-slate-900 dark:text-white tracking-tight text-[28px] font-bold leading-tight text-left">Favorite Cuisines</h2>
<p class="text-slate-500 dark:text-gray-400 text-base font-normal leading-normal pb-6 pt-2">
                What flavors excite you? Pick as many as you like.
            </p>
<div class="flex flex-wrap gap-3">
<!-- Selected State -->
<button class="group flex items-center gap-2 px-5 py-3 rounded-full bg-primary text-white border border-transparent transition-all active:scale-95 shadow-lg shadow-primary/20">
<span class="font-semibold">Italian</span>
<span class="material-symbols-outlined text-[18px]">check</span>
</button>
<!-- Unselected States -->
<button class="group flex items-center gap-2 px-5 py-3 rounded-full bg-white dark:bg-surface-dark text-slate-600 dark:text-gray-300 border border-gray-200 dark:border-white/10 hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary transition-all active:scale-95">
<span class="font-semibold">Japanese</span>
</button>
<button class="group flex items-center gap-2 px-5 py-3 rounded-full bg-primary text-white border border-transparent transition-all active:scale-95 shadow-lg shadow-primary/20">
<span class="font-semibold">Mexican</span>
<span class="material-symbols-outlined text-[18px]">check</span>
</button>
<button class="group flex items-center gap-2 px-5 py-3 rounded-full bg-white dark:bg-surface-dark text-slate-600 dark:text-gray-300 border border-gray-200 dark:border-white/10 hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary transition-all active:scale-95">
<span class="font-semibold">Thai</span>
</button>
<button class="group flex items-center gap-2 px-5 py-3 rounded-full bg-white dark:bg-surface-dark text-slate-600 dark:text-gray-300 border border-gray-200 dark:border-white/10 hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary transition-all active:scale-95">
<span class="font-semibold">Indian</span>
</button>
<button class="group flex items-center gap-2 px-5 py-3 rounded-full bg-white dark:bg-surface-dark text-slate-600 dark:text-gray-300 border border-gray-200 dark:border-white/10 hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary transition-all active:scale-95">
<span class="font-semibold">French</span>
</button>
<button class="group flex items-center gap-2 px-5 py-3 rounded-full bg-white dark:bg-surface-dark text-slate-600 dark:text-gray-300 border border-gray-200 dark:border-white/10 hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary transition-all active:scale-95">
<span class="font-semibold">Mediterranean</span>
</button>
</div>
</div>
<div class="h-px w-full bg-gray-100 dark:bg-white/5 my-8"></div>
<!-- Section 3: Disliked Ingredients -->
<div class="flex flex-col px-4 mb-4">
<h2 class="text-slate-900 dark:text-white tracking-tight text-[28px] font-bold leading-tight text-left">Allergies &amp; Dislikes</h2>
<p class="text-slate-500 dark:text-gray-400 text-base font-normal leading-normal pb-4 pt-2">
                Any ingredients to avoid?
            </p>
<div class="relative w-full mb-6 group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
<span class="material-symbols-outlined text-gray-400">search</span>
</div>
<input class="block w-full p-4 pl-12 text-base text-slate-900 dark:text-white bg-white dark:bg-surface-dark border border-gray-200 dark:border-white/10 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent placeholder-gray-400 dark:placeholder-gray-500 transition-all" placeholder="e.g., Peanuts, Cilantro, Shellfish..." required="" type="text"/>
</div>
<!-- Active Chips -->
<div class="flex flex-wrap gap-2">
<div class="flex items-center gap-2 px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/20 text-red-500 dark:text-red-400">
<span class="text-sm font-semibold">Peanuts</span>
<button class="flex items-center justify-center hover:bg-red-500/20 rounded-full size-5 transition-colors">
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
<div class="flex items-center gap-2 px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/20 text-red-500 dark:text-red-400">
<span class="text-sm font-semibold">Shellfish</span>
<button class="flex items-center justify-center hover:bg-red-500/20 rounded-full size-5 transition-colors">
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
</div>
</div>
<!-- Sticky Footer Action -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/95 dark:via-background-dark/95 to-transparent z-40">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/25 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Start Cooking</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
