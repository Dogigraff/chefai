<div class="group">

<div class="glass-input flex items-center w-full rounded-2xl h-16 px-4 transition-all duration-300">

</div>
</div>
<div class="group">
<label class="sr-only" for="password">Password</label>

<span class="material-symbols-outlined text-white/40 mr-3 group-focus-within:text-primary transition-colors">lock</span>

<button class="text-white/40 hover:text-white transition-colors p-2 flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end w-full -mt-2">
<a class="text-sm font-medium text-white/50 hover:text-primary transition-colors" href="#">

</div>
